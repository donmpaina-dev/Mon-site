<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulaire d’identité - École Eureka</title>
  <link rel="stylesheet" href="style.css">
  <script>
    function imprimerFormulaire() {
      window.print();
    }
  </script>
</head>
<body>
    <header>
    <div class="logo">[LOGO ICI]</div>
    <nav>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="Inscription.html">Inscription</a></li>
        <li><a href="Identité.html">Identité</a></li>
      </ul>
    </nav>
  </header>
  <header>
    <h1>Formulaire d’identité</h1>
  </header>

  <main>
    <form>
      <label for="prenom">Prénom :</label>
      <input type="text" id="prenom" name="prenom" required><br><br>

      <label for="nom">Nom :</label>
      <input type="text" id="nom" name="nom" required><br><br>

      <label for="dob">Date de naissance :</label>
      <input type="date" id="dob" name="dob" required><br><br>

      <label for="classe">Classe :</label>
      <input type="text" id="classe" name="classe" required><br><br>

      <label for="option">Option :</label>
      <input type="text" id="option" name="option" required><br><br>

      <label for="adresse">Adresse :</label>
      <input type="text" id="adresse" name="adresse" required><br><br>

      <label for="tel">Téléphone :</label>
      <input type="tel" id="tel" name="tel" required><br><br>

      <label for="email">Email :</label>
      <input type="email" id="email" name="email" required><br><br>

      <button type="button" onclick="imprimerFormulaire()">Imprimer</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 École Eureka</p>
  </footer>
</body>
</html>
